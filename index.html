<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Afribook - Social Platform for Tasks & Videos</title>
    <meta name="description" content="Afribook: Earn points by completing tasks, watching videos, and connecting with friends!" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="" id="favicon" />

    <!-- Social / Open Graph Tags -->
    <meta property="og:title" content="Afribook - Social Media For Content Creators, Tasks & Videos Sharing"/>
    <meta property="og:description" content="Post videos and reels. Share post, texts and pictures. Monetize your contents, earn points and withdraw cash, watch videos, complete tasks, and interact with friends on Afribook!" />
    <meta property="og:image" content="" id="og-image" />
    <meta property="og:url" content="" id="og-url" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Afribook - Social Platform for Tasks & Videos" />
    <meta name="twitter:description" content="Earn points, watch videos, complete tasks, and interact with friends on Afribook!" />
    <meta name="twitter:image" content="" id="twitter-image" />
    <meta name="twitter:url" content="" id="twitter-url" />

    <!-- Fonts / Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Main CSS -->
    <link rel="stylesheet" href="/style.css" />

    <!-- Vite -->
    <script type="module" src="/src/main.jsx"></script>

    <!-- Dynamic frontend URL with backup -->
    <script type="module">
      // Main frontend from Vite env
      const MAIN_URL = import.meta.env.VITE_API_BASE;
      // Backup frontend URL (set in Render)
      const BACKUP_URL = import.meta.env.VITE_FRONTEND_BACKUP_URL || "https://afribook.globelynks.com";

      // Use main if available, otherwise fallback to backup
      const FRONTEND_URL = MAIN_URL || BACKUP_URL || window.location.origin;

      // Set meta tags dynamically
      document.getElementById("og-url").setAttribute("content", FRONTEND_URL);
      document.getElementById("twitter-url").setAttribute("content", FRONTEND_URL);

      // Set favicon and social preview dynamically
      document.getElementById("favicon").setAttribute("href", `${FRONTEND_URL}/favicon.png`);
      document.getElementById("og-image").setAttribute("content", `${FRONTEND_URL}/social-preview.png`);
      document.getElementById("twitter-image").setAttribute("content", `${FRONTEND_URL}/social-preview.png`);
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
